name: Обновить текущую неделю
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: python scripts/update_current_week.py
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md CURRENT.md || echo "No changes"
          git commit -m "📍 Auto-update: current week [skip ci]" || echo "No changes to commit"
          git push
